<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f8f4e8"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="40" fill="#f0d9c8"/>
  
  <!-- Hair -->
  <path d="M 60 80 Q 60 40 100 40 Q 140 40 140 80" fill="#6b4423"/>
  
  <!-- Eyes -->
  <circle cx="88" cy="75" r="4" fill="#1a1a1a"/>
  <circle cx="112" cy="75" r="4" fill="#1a1a1a"/>
  
  <!-- Happy smile -->
  <path d="M 83 91 Q 100 106 117 91" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Teeth visible -->
  <rect x="83" y="89" width="34" height="8" fill="#ffffff" stroke="#ddd" stroke-width="0.5"/>
  
  <!-- Nose -->
  <line x1="100" y1="80" x2="100" y2="88" stroke="#e0c8b8" stroke-width="1.5"/>
  
  <!-- Body - purple shirt -->
  <ellipse cx="100" cy="140" rx="45" ry="50" fill="#9b59b6"/>
  
  <!-- Shirt pattern -->
  <circle cx="90" cy="130" r="3" fill="#8e44ad"/>
  <circle cx="110" cy="130" r="3" fill="#8e44ad"/>
  
  <!-- Arms -->
  <ellipse cx="55" cy="135" rx="15" ry="35" fill="#f0d9c8"/>
  <ellipse cx="145" cy="135" rx="15" ry="35" fill="#f0d9c8"/>
</svg>