<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5e8f4"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="40" fill="#f4c4a0"/>
  
  <!-- Hair -->
  <path d="M 60 80 Q 60 40 100 40 Q 140 40 140 80" fill="#d4a574"/>
  <path d="M 70 50 Q 75 35 85 40" fill="#d4a574"/>
  <path d="M 130 50 Q 125 35 115 40" fill="#d4a574"/>
  
  <!-- Eyes -->
  <circle cx="88" cy="75" r="4" fill="#1a1a1a"/>
  <circle cx="112" cy="75" r="4" fill="#1a1a1a"/>
  
  <!-- Bright smile -->
  <path d="M 82 92 Q 100 108 118 92" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Teeth visible -->
  <rect x="82" y="90" width="36" height="8" fill="#ffffff" stroke="#ddd" stroke-width="0.5"/>
  
  <!-- Nose -->
  <line x1="100" y1="80" x2="100" y2="88" stroke="#e8b8a0" stroke-width="1.5"/>
  
  <!-- Body - pink top -->
  <ellipse cx="100" cy="140" rx="45" ry="50" fill="#e91e63"/>
  
  <!-- Neckline -->
  <path d="M 80 120 Q 100 115 120 120" stroke="#c2185b" stroke-width="2" fill="none"/>
  
  <!-- Arms -->
  <ellipse cx="55" cy="135" rx="15" ry="35" fill="#f4c4a0"/>
  <ellipse cx="145" cy="135" rx="15" ry="35" fill="#f4c4a0"/>
</svg>