<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Wall -->
  <rect width="800" height="600" fill="#e8f4f8"/>
  
  <!-- Waiting area chairs -->
  <rect x="50" y="150" width="120" height="100" fill="#2c3e50" rx="8"/>
  <rect x="50" y="150" width="120" height="30" fill="#34495e"/>
  
  <rect x="200" y="150" width="120" height="100" fill="#2c3e50" rx="8"/>
  <rect x="200" y="150" width="120" height="30" fill="#34495e"/>
  
  <rect x="350" y="150" width="120" height="100" fill="#2c3e50" rx="8"/>
  <rect x="350" y="150" width="120" height="30" fill="#34495e"/>
  
  <!-- Reception desk -->
  <rect x="550" y="100" width="200" height="150" fill="#8b7355" rx="5"/>
  <rect x="550" y="100" width="200" height="40" fill="#a0826d"/>
  
  <!-- Reception person -->
  <circle cx="650" cy="180" r="25" fill="#d4a574"/>
  <path d="M 625 180 Q 625 160 650 160 Q 675 160 675 180" fill="#3d2817"/>
  
  <!-- Plant -->
  <rect x="100" y="350" width="40" height="80" fill="#8b6f47"/>
  <circle cx="85" cy="330" r="20" fill="#27ae60"/>
  <circle cx="105" cy="320" r="22" fill="#27ae60"/>
  <circle cx="125" cy="330" r="20" fill="#27ae60"/>
  
  <!-- Window -->
  <rect x="500" y="50" width="200" height="150" fill="#87ceeb" stroke="#34495e" stroke-width="3"/>
  <line x1="600" y1="50" x2="600" y2="200" stroke="#34495e" stroke-width="2"/>
  <line x1="500" y1="125" x2="700" y2="125" stroke="#34495e" stroke-width="2"/>
  
  <!-- Light fixture -->
  <circle cx="400" cy="30" r="15" fill="#f1c40f"/>
  <rect x="395" y="45" width="10" height="20" fill="#bdc3c7"/>
  
  <!-- Floor pattern -->
  <rect x="0" y="500" width="800" height="100" fill="#d4d4d4"/>
  <line x1="0" y1="550" x2="800" y2="550" stroke="#999" stroke-width="1" opacity="0.5"/>
</svg>