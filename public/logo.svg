<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for logo -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Tooth outline -->
  <path d="M 60 50 Q 50 60 50 80 Q 50 100 60 110 L 100 140 L 140 110 Q 150 100 150 80 Q 150 60 140 50 Q 120 40 100 40 Q 80 40 60 50 Z" 
        fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Implant screw -->
  <rect x="95" y="110" width="10" height="50" fill="#1a1a1a" rx="2"/>
  
  <!-- Screw threads -->
  <line x1="90" y1="120" x2="110" y2="120" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="90" y1="130" x2="110" y2="130" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="90" y1="140" x2="110" y2="140" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="90" y1="150" x2="110" y2="150" stroke="#1a1a1a" stroke-width="2"/>
</svg>