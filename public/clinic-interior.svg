<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f8ff"/>
  
  <!-- Wall -->
  <rect width="800" height="600" fill="#e6f2ff"/>
  
  <!-- Dental chair -->
  <ellipse cx="400" cy="300" rx="100" ry="80" fill="#ffffff" stroke="#34495e" stroke-width="2"/>
  <rect x="350" y="250" width="100" height="40" fill="#2c3e50" rx="5"/>
  <rect x="320" y="320" width="160" height="30" fill="#34495e" rx="3"/>
  
  <!-- Overhead light -->
  <circle cx="400" cy="100" r="40" fill="#f1c40f" opacity="0.8"/>
  <rect x="395" y="140" width="10" height="60" fill="#bdc3c7"/>
  <rect x="380" y="200" width="40" height="20" fill="#34495e"/>
  
  <!-- Dental instruments tray -->
  <rect x="550" y="280" width="150" height="80" fill="#e0e0e0" rx="5"/>
  <circle cx="570" cy="300" r="8" fill="#999"/>
  <circle cx="600" cy="300" r="8" fill="#999"/>
  <circle cx="630" cy="300" r="8" fill="#999"/>
  <circle cx="570" cy="330" r="8" fill="#999"/>
  <circle cx="600" cy="330" r="8" fill="#999"/>
  <circle cx="630" cy="330" r="8" fill="#999"/>
  
  <!-- Monitor -->
  <rect x="100" y="200" width="120" height="100" fill="#1a1a1a" rx="5"/>
  <rect x="105" y="205" width="110" height="85" fill="#0066cc"/>
  <rect x="100" y="305" width="120" height="15" fill="#34495e"/>
  
  <!-- Cabinet -->
  <rect x="50" y="380" width="200" height="150" fill="#8b7355" rx="5"/>
  <rect x="60" y="390" width="80" height="60" fill="#a0826d" stroke="#6b5344" stroke-width="1"/>
  <rect x="150" y="390" width="80" height="60" fill="#a0826d" stroke="#6b5344" stroke-width="1"/>
  <rect x="60" y="460" width="80" height="60" fill="#a0826d" stroke="#6b5344" stroke-width="1"/>
  <rect x="150" y="460" width="80" height="60" fill="#a0826d" stroke="#6b5344" stroke-width="1"/>
  
  <!-- Sink -->
  <rect x="650" y="400" width="100" height="80" fill="#c0c0c0" rx="5"/>
  <circle cx="700" cy="420" r="20" fill="#e8e8e8" stroke="#999" stroke-width="2"/>
  
  <!-- Floor -->
  <rect x="0" y="500" width="800" height="100" fill="#d4d4d4"/>
</svg>