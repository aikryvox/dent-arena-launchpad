<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#e8f8f4"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="40" fill="#c9956f"/>
  
  <!-- Hair -->
  <path d="M 60 80 Q 60 40 100 40 Q 140 40 140 80" fill="#1a1a1a"/>
  
  <!-- Eyes -->
  <circle cx="88" cy="75" r="4" fill="#1a1a1a"/>
  <circle cx="112" cy="75" r="4" fill="#1a1a1a"/>
  
  <!-- Confident smile -->
  <path d="M 85 92 Q 100 105 115 92" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Teeth visible -->
  <rect x="85" y="90" width="30" height="8" fill="#ffffff" stroke="#ddd" stroke-width="0.5"/>
  
  <!-- Nose -->
  <line x1="100" y1="80" x2="100" y2="88" stroke="#b8845c" stroke-width="1.5"/>
  
  <!-- Body - green shirt -->
  <ellipse cx="100" cy="140" rx="45" ry="50" fill="#27ae60"/>
  
  <!-- Shirt details -->
  <path d="M 80 120 L 75 135" stroke="#229954" stroke-width="2"/>
  <path d="M 120 120 L 125 135" stroke="#229954" stroke-width="2"/>
  
  <!-- Arms -->
  <ellipse cx="55" cy="135" rx="15" ry="35" fill="#c9956f"/>
  <ellipse cx="145" cy="135" rx="15" ry="35" fill="#c9956f"/>
</svg>