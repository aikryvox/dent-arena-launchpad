<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Before section -->
  <rect x="50" y="50" width="300" height="500" fill="#fff5f5" stroke="#e0e0e0" stroke-width="2" rx="10"/>
  <text x="200" y="100" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">BEFORE</text>
  
  <!-- Before face -->
  <circle cx="200" cy="200" r="60" fill="#d4a574"/>
  <path d="M 140 200 Q 140 150 200 150 Q 260 150 260 200" fill="#3d2817"/>
  
  <!-- Before teeth (imperfect) -->
  <rect x="170" y="240" width="60" height="30" fill="#f0e68c" stroke="#999" stroke-width="1"/>
  <line x1="180" y1="240" x2="180" y2="270" stroke="#999" stroke-width="1"/>
  <line x1="190" y1="240" x2="190" y2="270" stroke="#999" stroke-width="1"/>
  <line x1="200" y1="240" x2="200" y2="270" stroke="#999" stroke-width="1"/>
  <line x1="210" y1="240" x2="210" y2="270" stroke="#999" stroke-width="1"/>
  <line x1="220" y1="240" x2="220" y2="270" stroke="#999" stroke-width="1"/>
  
  <!-- Before eyes -->
  <circle cx="180" cy="180" r="5" fill="#1a1a1a"/>
  <circle cx="220" cy="180" r="5" fill="#1a1a1a"/>
  
  <!-- After section -->
  <rect x="450" y="50" width="300" height="500" fill="#f5fff5" stroke="#e0e0e0" stroke-width="2" rx="10"/>
  <text x="600" y="100" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AFTER</text>
  
  <!-- After face -->
  <circle cx="600" cy="200" r="60" fill="#d4a574"/>
  <path d="M 540 200 Q 540 150 600 150 Q 660 150 660 200" fill="#3d2817"/>
  
  <!-- After teeth (perfect) -->
  <rect x="570" y="240" width="60" height="30" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <line x1="580" y1="240" x2="580" y2="270" stroke="#ddd" stroke-width="1"/>
  <line x1="590" y1="240" x2="590" y2="270" stroke="#ddd" stroke-width="1"/>
  <line x1="600" y1="240" x2="600" y2="270" stroke="#ddd" stroke-width="1"/>
  <line x1="610" y1="240" x2="610" y2="270" stroke="#ddd" stroke-width="1"/>
  <line x1="620" y1="240" x2="620" y2="270" stroke="#ddd" stroke-width="1"/>
  
  <!-- After eyes -->
  <circle cx="580" cy="180" r="5" fill="#1a1a1a"/>
  <circle cx="620" cy="180" r="5" fill="#1a1a1a"/>
  
  <!-- Smile indicator -->
  <path d="M 570 260 Q 600 280 630 260" stroke="#27ae60" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Arrow between -->
  <path d="M 380 300 L 420 300" stroke="#3498db" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Result text -->
  <text x="400" y="450" font-size="18" font-weight="bold" text-anchor="middle" fill="#27ae60">Transformation Complete!</text>
  <text x="400" y="480" font-size="14" text-anchor="middle" fill="#666">Professional teeth whitening & alignment</text>
</svg>