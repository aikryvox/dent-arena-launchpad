<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f4f8e8"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="40" fill="#d4a574"/>
  
  <!-- Hair -->
  <path d="M 60 80 Q 60 40 100 40 Q 140 40 140 80" fill="#4a3728"/>
  
  <!-- Eyes -->
  <circle cx="88" cy="75" r="4" fill="#1a1a1a"/>
  <circle cx="112" cy="75" r="4" fill="#1a1a1a"/>
  
  <!-- Joyful smile -->
  <path d="M 84 90 Q 100 104 116 90" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Teeth visible -->
  <rect x="84" y="88" width="32" height="8" fill="#ffffff" stroke="#ddd" stroke-width="0.5"/>
  
  <!-- Nose -->
  <line x1="100" y1="80" x2="100" y2="88" stroke="#c9956f" stroke-width="1.5"/>
  
  <!-- Body - orange shirt -->
  <ellipse cx="100" cy="140" rx="45" ry="50" fill="#f39c12"/>
  
  <!-- Shirt collar -->
  <path d="M 80 120 L 75 135 L 100 130 L 125 135 L 120 120" fill="#d68910"/>
  
  <!-- Arms -->
  <ellipse cx="55" cy="135" rx="15" ry="35" fill="#d4a574"/>
  <ellipse cx="145" cy="135" rx="15" ry="35" fill="#d4a574"/>
</svg>